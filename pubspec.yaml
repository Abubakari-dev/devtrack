name: devtrack
description: Developer Productivity Operating System
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Fonts
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  equatable: ^2.0.5
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^13.0.0
  
  # Local Storage & Database
  drift: ^2.16.0
  sqlcipher_flutter_libs: ^0.6.1
  sqlite3: ^2.4.0
  sqflite: ^2.3.0
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  
  # Models & Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  firebase_messaging: ^15.1.3
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1
  
  # Biometric Auth
  local_auth: ^2.3.0
  local_auth_android: ^1.0.36
  local_auth_darwin: ^1.3.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Files & Images
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  path_provider: ^2.1.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  
  # UUID
  uuid: ^4.3.3
  
  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  workmanager: ^0.9.0+3
  
  # Charts
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.16.0
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/features/img/Devtrack.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  # Generate adaptive icons for Android
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/features/img/Devtrack.png"

flutter:
  uses-material-design: true
  assets:
    - lib/features/img/
    # - assets/sounds/  # Uncomment and create this folder if you want to add custom notification sounds
